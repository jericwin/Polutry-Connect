{% extends "auth_base.html" %}

{% block title %}Create Account — PoultryConnect{% endblock %}

{% block form_content %}

<h2 class="auth-form-title">Create your account</h2>
<p class="auth-form-subtitle">
    Already registered?
    <a href="{{ url_for('auth.login') }}">Sign in instead</a>
</p>

<form method="POST" action="{{ url_for('auth.register') }}" novalidate>

    <div class="form-row">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input
                type="text"
                id="first_name"
                name="first_name"
                placeholder="Juan"
                value="{{ form_data.get('first_name', '') }}"
                required
            >
        </div>
        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input
                type="text"
                id="last_name"
                name="last_name"
                placeholder="dela Cruz"
                value="{{ form_data.get('last_name', '') }}"
                required
            >
        </div>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            value="{{ form_data.get('email', '') }}"
            autocomplete="email"
            required
        >
    </div>

    <div class="form-group">
        <label for="username">Username</label>
        <input
            type="text"
            id="username"
            name="username"
            placeholder="Choose a unique username"
            value="{{ form_data.get('username', '') }}"
            autocomplete="username"
            required
        >
    </div>

    <div class="form-group">
        <label for="role">I am a...</label>
        <div class="select-wrap">
            <select id="role" name="role" required>
                <option value="" disabled {% if not form_data.get('role') %}selected{% endif %}>Select your role</option>
                <option value="farmer"       {% if form_data.get('role') == 'farmer'       %}selected{% endif %}>Farmer</option>
                <option value="buyer"        {% if form_data.get('role') == 'buyer'        %}selected{% endif %}>Buyer</option>
                <!-- <option value="feed_supplier"{% if form_data.get('role') == 'feed_supplier'%}selected{% endif %}>Feed Supplier</option> -->
                <!-- <option value="veterinarian" {% if form_data.get('role') == 'veterinarian' %}selected{% endif %}>Veterinarian</option> -->
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Min. 8 characters"
                autocomplete="new-password"
                required
            >
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="Repeat password"
                autocomplete="new-password"
                required
            >
        </div>
    </div>

    <button type="submit" class="btn-auth" style="margin-top: 0.25rem;">Create My Account</button>

</form>

{% endblock %}
