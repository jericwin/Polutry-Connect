{% extends "auth_base.html" %}

{% block title %}My Profile — PoultryConnect{% endblock %}

{% block form_content %}

<h2 class="auth-form-title">My Profile</h2>
<p class="auth-form-sub">
    Update your account details and password.
</p>

<form method="POST" action="{{ url_for('auth.profile') }}" novalidate>

    <div class="form-row">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input
                type="text"
                id="first_name"
                name="first_name"
                placeholder="Juan"
                value="{{ form_data.get('first_name', '') }}"
                required
            >
        </div>
        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input
                type="text"
                id="last_name"
                name="last_name"
                placeholder="dela Cruz"
                value="{{ form_data.get('last_name', '') }}"
                required
            >
        </div>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            value="{{ form_data.get('email', '') }}"
            autocomplete="email"
            required
        >
    </div>

    <div class="form-group">
        <label for="username">Username</label>
        <input
            type="text"
            id="username"
            name="username"
            placeholder="Your username"
            value="{{ form_data.get('username', '') }}"
            autocomplete="username"
            required
        >
    </div>

    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="09XXXXXXXXX"
            value="{{ form_data.get('phone', '') }}"
            autocomplete="tel"
        >
    </div>

    <div class="form-group">
        <label for="role">Role</label>
        <input
            type="text"
            id="role"
            name="role"
            value="{{ current_user.role.value|replace('_',' ')|title }}"
            readonly
            disabled
        >
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="password">New Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Leave blank to keep current password"
                autocomplete="new-password"
            >
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="Repeat new password"
                autocomplete="new-password"
            >
        </div>
    </div>

    <button type="submit" class="btn-auth" style="margin-top: 0.25rem;">Save Changes</button>

</form>

{% endblock %}
