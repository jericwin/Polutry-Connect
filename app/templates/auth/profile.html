{% extends "auth_base.html" %}

{% block title %}My Profile — PoultryConnect{% endblock %}

{% block form_content %}

<h2 class="auth-form-title">My Profile</h2>
<p class="auth-form-sub">
    Update your account details and password.
</p>

<form method="POST" action="{{ url_for('auth.profile') }}" novalidate>

    <div class="form-row">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input
                type="text"
                id="first_name"
                name="first_name"
                placeholder="Juan"
                value="{{ form_data.get('first_name', '') }}"
                required
            >
        </div>
        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input
                type="text"
                id="last_name"
                name="last_name"
                placeholder="dela Cruz"
                value="{{ form_data.get('last_name', '') }}"
                required
            >
        </div>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            value="{{ form_data.get('email', '') }}"
            autocomplete="email"
            required
        >
    </div>

    <div class="form-group">
        <label for="username">Username</label>
        <input
            type="text"
            id="username"
            name="username"
            placeholder="Your username"
            value="{{ form_data.get('username', '') }}"
            autocomplete="username"
            required
        >
    </div>

    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="09XXXXXXXXX"
            value="{{ form_data.get('phone', '') }}"
            autocomplete="tel"
        >
    </div>

    {% if current_user.role.value == 'buyer' %}
    <div style="background: var(--surface-container-lowest); border: 1px solid var(--outline-variant); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
        <h3 style="margin-top: 0; margin-bottom: 1rem; font-size: 1.1rem; color: var(--primary);">Delivery Information</h3>
        <div class="form-group">
            <label for="address">City / Municipality <span class="required">*</span></label>
            <select id="address" name="address" style="width: 100%; border: 1.5px solid var(--outline); border-radius: var(--radius-sm); padding: 0.8rem 1rem; font-family: var(--font-body); font-size: 0.95rem; color: var(--on-surface); background-color: #ffffff; outline: none; transition: all 0.2s ease;">
                <option value="">— Select your location —</option>
                <option value="Santa Maria, Laguna" {% if form_data.get('address') == 'Santa Maria, Laguna' %}selected{% endif %}>Santa Maria, Laguna</option>
                <option value="Siniloan, Laguna" {% if form_data.get('address') == 'Siniloan, Laguna' %}selected{% endif %}>Siniloan, Laguna</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label for="landmark">Specific Address / Landmark <span class="required">*</span></label>
            <input 
                type="text" 
                id="landmark" 
                name="landmark" 
                placeholder="e.g. Near Plaza, Blk 1 Lot 2" 
                value="{{ form_data.get('landmark', '') }}" 
                style="width: 100%; border: 1.5px solid var(--outline); border-radius: var(--radius-sm); padding: 0.8rem 1rem; font-family: var(--font-body); font-size: 0.95rem; color: var(--on-surface); background-color: #ffffff; outline: none; transition: all 0.2s ease;"
                required
            >
        </div>
    </div>
    {% endif %}

    <div class="form-group">
        <label for="role">Role</label>
        <input
            type="text"
            id="role"
            name="role"
            value="{{ current_user.role.value|replace('_',' ')|title }}"
            readonly
            disabled
        >
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="password">New Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Leave blank to keep current password"
                autocomplete="new-password"
            >
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="Repeat new password"
                autocomplete="new-password"
            >
        </div>
    </div>

    <button type="submit" class="btn-auth" style="margin-top: 0.25rem;">Save Changes</button>

</form>

{% endblock %}
